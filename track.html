<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Package</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}

/* Header */
.header {
    background: #1f3c68;
    color: white;
    padding: 15px;
    font-size: 18px;
}

/* Container */
.container {
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 20px;
    border: 2px solid #ccc;
    border-radius: 5px;
}

/* Card */
.card {
    background: #e8dccb;
    padding: 20px;
    border-left: 5px solid orange;
    border-radius: 5px;
}

/* Status Icons */
.status {
    display: flex;
    justify-content: space-between;
    margin: 20px 0;
}

.step {
    text-align: center;
    font-size: 14px;
}

.circle {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #ccc;
    margin: auto;
    line-height: 35px;
    color: white;
}

.active {
    background: green;
}
</style>
</head>

<body>

<div class="header">
🌐 Global Express Courier
</div>

<div class="container">

<h2>Track Package</h2>

<input type="text" id="codeInput">

<div id="result"></div>

</div>

<script>
// Get code from URL
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

document.getElementById("codeInput").value = code;

// Get stored data
let data = JSON.parse(localStorage.getItem(code));

if (!data) {
    document.getElementById("result").innerHTML = "<h3>Tracking Not Found</h3>";
} else {

    let shipped = "";
    let transit = "";
    let hold = "";

    if (data.status === "Shipped") shipped = "active";
    if (data.status === "Transit") transit = "active";
    if (data.status === "Hold") hold = "active";

    document.getElementById("result").innerHTML = `
    <div class="card">
        <h3>${data.status}</h3>

        <div class="status">
            <div class="step">
                <div class="circle ${shipped}">✓</div>
                Shipped
            </div>
            <div class="step">
                <div class="circle ${transit}">✓</div>
                Transit
            </div>
            <div class="step">
                <div class="circle ${hold}">!</div>
                Hold
            </div>
        </div>

        <p><b>Tracking:</b> ${code}</p>
        <p><b>Location:</b> ${data.location}</p>
        <p><b>Date:</b> ${new Date().toDateString()}</p>
    </div>
    `;
}
</script>

</body>
</html>
