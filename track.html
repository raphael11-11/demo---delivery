<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking Result</title>

<style>
body { font-family: Arial; background:#eef2f7; padding:20px; }

.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

.statusBox {
  background:#e8dccb;
  padding:15px;
  margin-top:15px;
  border-left:5px solid orange;
}
</style>
</head>

<body>

<div class="card">

<h2>📦 Shipment Details</h2>

<p><b>Tracking Code:</b> <span id="code"></span></p>
<p><b>Status:</b> <span id="status"></span></p>
<p><b>Location:</b> <span id="location"></span></p>
<p><b>Date:</b> <span id="date"></span></p>

<div class="statusBox" id="extra"></div>

</div>

<script>
let params = new URLSearchParams(window.location.search);
let code = params.get("code");

let data = JSON.parse(localStorage.getItem("tracking") || "{}");

if(data[code]){
let d = data[code];

document.getElementById("code").innerText = code;
document.getElementById("status").innerText = d.status;
document.getElementById("location").innerText = d.location;
document.getElementById("date").innerText = new Date().toDateString();

if(d.status === "On Hold"){
document.getElementById("extra").innerHTML =
"⚠ Package is currently on hold. Please contact support.";
}

}else{
document.body.innerHTML = "<h2>Tracking Not Found</h2>";
}
</script>

</body>
</html>
